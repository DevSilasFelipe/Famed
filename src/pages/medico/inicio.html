<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/medico/inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">


    <title>Famed | Médicos</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="../../img/logo2.png" alt="Logo Famed">
        </div><!--logo-->

        <nav class="menu">
            <a href="#">Meus Pacientes</a>
            <a href="#">Minhas Receitas</a>
        </nav><!--menu-->

        <div class="nav-actions">
            <a href="#" class="btn-criar">
                CRIAR
            </a>
            
            <a href="#" class="perfil">
                <img src="../../img/perfil.png" alt="Perfil">
            </a>
        </div><!--nav-actions-->
    </header><!--navbar-->

    <main class="main">
        <div class="titulo">
            <h1>Olá, Doutor!</h1>
            <p>O que deseja fazer hoje?</p>
        </div><!--titulo-->

        <section class="cards">

            <!--CARD 1-->
            <a href="#" class="card">
                <div class="forma"></div>

                <img src="../../img/prescricao.png" alt="Nova Prescrição">

                <h2>Nova Prescrição</h2>
                <p>Crie uma nova Receita Digital</p>
            </a>

            <!-- CARD 2 -->
            <a href="#" class="card">
                <div class="forma"></div>

                <img src="../../img/historico.png" alt="Ver Histórico">

                <h2>Ver Histórico</h2>
                <p>Veja suas receitas já prescritas</p>
            </a>

            <!-- CARD 3 -->
            <a href="#" class="card">
                <div class="forma"></div>

                <img src="../../img/paciente.png" alt="Cadastrar Paciente">

                <h2>Cadastrar Paciente</h2>
                <p>Cadastre um novo paciente</p>
            </a>
        </section><!--cards-->
    </main>
    

    <footer class="footer">
        <img src="../../img/logobranca.png" alt="Logo Famed Branca">

        <div class="footer-links">
            <a href="#">Ajuda</a>
            <a href="#">Termos de Uso</a>
            <a href="#">Política de Privacidade</a>
        </div><!--footer-links-->
    </footer>
</body>
</html>
