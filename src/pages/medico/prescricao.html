<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/medico/prescricao.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">


    <title>Famed | Médicos</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="../../img/logo2.png" alt="Logo Famed">
        </div><!--logo-->

        <nav class="menu">
            <a href="#">Meus Pacientes</a>
            <a href="#">Minhas Receitas</a>
        </nav><!--menu-->

        <div class="nav-actions">
            <a href="#" class="btn-criar">
                CRIAR
            </a>
            
            <a href="#" class="perfil">
                <img src="../../img/perfil.png" alt="Perfil">
            </a>
        </div><!--nav-actions-->
    </header><!--navbar-->

    <main class="main">
        <div class="titulo">
            <h1>Nova Prescrição</h1>
        </div><!--titulo-->

        <section>
            <div class="card">
                <!--formularios-->
                <form class="form">
                    <label for="NomeCliente">Paciente</label><br>
                        <input type="text" id="NomeCliente" name="NomeCliente" placeholder="Nome Completo"><br>
                    <label for="CPF">CPF</label><br>
                        <input type="text" id="CPF" name="CPF" placeholder="000.000.000-00" maxlength="11"><br>
                    <label for="TipoReceita">Tipo da Receita</label><br>
                        <select id="TipoReceita" name="TipoReceita" required>
                            <option selected disabled>Selecionar</option>
                            <option>Comum</option>
                            <option>Antimicrobianos</option>
                            <option>Controle Especial (C1)</option>
                        </select><br>
                        <label for="Medicamento">Medicamento</label><br>
                        <input type="search" id="Medicamento" name="Medicamento" placeholder="Pesquisar">
                </form>
            </div>
        </section>
        
    </main>
    

    <footer class="footer">
        <img src="../../img/logobranca.png" alt="Logo Famed Branca">

        <div class="footer-links">
            <a href="#">Ajuda</a>
            <a href="#">Termos de Uso</a>
            <a href="#">Política de Privacidade</a>
        </div><!--footer-links-->
    </footer>
</body>
</html>
